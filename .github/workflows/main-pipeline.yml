name: Archer CI/CD Pipeline

on:
  workflow_dispatch:
  schedule:
    # 6:00 PM EST = 23:00 UTC
    - cron: '0 23 * * *'

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  # ====================================================
  # JOB 1: PROVISION & DETECT STACK
  # ====================================================
  provision-stack:
    name: Provision Stack
    runs-on: ubuntu-latest
    outputs:
      fe_provider: ${{ steps.parse.outputs.fe_provider }}
      project_name: ${{ steps.parse.outputs.project_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta
      - name: Parse stack.json
        id: parse
        run: |
          echo "fe_provider=$(jq -r '.frontend.provider' setup/stack.json)" >> $GITHUB_OUTPUT
          echo "project_name=$(jq -r '.project_name' setup/stack.json)" >> $GITHUB_OUTPUT

  # ====================================================
  # JOB 2: DEPLOY STAGING & RESOLVE URL
  # Deploys the latest beta code to Vercel before tests.
  # Falls back to existing deployment if secrets missing.
  # ====================================================
  resolve-staging:
    name: Deploy Staging
    needs: provision-stack
    runs-on: ubuntu-latest
    outputs:
      staging_url: ${{ steps.set-url.outputs.staging_url }}
    steps:
      - name: Deploy beta to Vercel staging
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_BETA: ${{ secrets.VERCEL_PROJECT_ID_BETA }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID_BETA" ]; then
            echo "Vercel secrets not configured. Tests will run against existing deployment."
            echo "To enable: add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_BETA to repo secrets."
            echo "deployed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Triggering Vercel staging deployment from beta branch..."
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"amd1-1-beta\",
              \"project\": \"$VERCEL_PROJECT_ID_BETA\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": \"${{ github.repository_id }}\",
                \"ref\": \"beta\"
              }
            }" 2>&1)

          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')

          if [ -n "$ERROR" ] || [ -z "$DEPLOY_ID" ]; then
            echo "Vercel API error: ${ERROR:-no deploy ID returned}"
            echo "Tests will run against existing deployment."
            echo "deployed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Deployment triggered (ID: $DEPLOY_ID). Waiting for ready state..."

          for i in $(seq 1 36); do
            STATUS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$DEPLOY_ID" | jq -r '.readyState')
            echo "  Attempt $i/36: $STATUS"
            if [ "$STATUS" = "READY" ]; then
              echo "Staging deployment ready."
              echo "deployed=true" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "Deployment failed: $STATUS"
              echo "deployed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 10
          done

          echo "Deployment timed out after 6 minutes. Tests will run against existing deployment."
          echo "deployed=false" >> $GITHUB_OUTPUT

      - id: set-url
        run: echo "staging_url=https://amd1-1-beta.vercel.app" >> $GITHUB_OUTPUT

  # ====================================================
  # JOBS 3a-3f: TEST AGENTS (PARALLEL)
  #
  # All agents use continue-on-error on the test step so
  # the pipeline always completes. Results are uploaded as
  # JSON artifacts for the QC report job to analyze.
  #
  # Reporter note: DO NOT pass --reporter on the CLI.
  # playwright.config.ts auto-detects CI and uses list +
  # html + json reporters.
  # ====================================================

  test-wizard:
    name: "Agent 1a: Wizard + Enrichment"
    needs: resolve-staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-jammy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run wizard + enrichment tests
        continue-on-error: true
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ needs.resolve-staging.outputs.staging_url }}
          BASE_URL: ${{ needs.resolve-staging.outputs.staging_url }}
          HOME: /root
          NEXT_PUBLIC_SKIP_LOADING_DELAY: 'true'
        run: |
          echo "────────────────────────────────────────"
          echo "  AGENT 1a: WIZARD + ENRICHMENT"
          echo "  Target: $PLAYWRIGHT_TEST_BASE_URL"
          echo "  Files: wizard-flow, enrichment"
          echo "────────────────────────────────────────"
          npx playwright test \
            tests/e2e/wizard-flow.spec.ts \
            tests/e2e/enrichment.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-wizard
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-wizard
          path: test-results.json
          if-no-files-found: warn
          retention-days: 7

  test-executive-review:
    name: "Agent 1b: Executive Review"
    needs: resolve-staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-jammy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run executive review tests
        continue-on-error: true
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ needs.resolve-staging.outputs.staging_url }}
          BASE_URL: ${{ needs.resolve-staging.outputs.staging_url }}
          HOME: /root
          NEXT_PUBLIC_SKIP_LOADING_DELAY: 'true'
        run: |
          echo "────────────────────────────────────────"
          echo "  AGENT 1b: EXECUTIVE REVIEW"
          echo "  Target: $PLAYWRIGHT_TEST_BASE_URL"
          echo "  Files: executive-review"
          echo "────────────────────────────────────────"
          npx playwright test tests/e2e/executive-review.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-executive-review
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-exec-review
          path: test-results.json
          if-no-files-found: warn
          retention-days: 7

  test-security:
    name: "Agent 2: Security"
    needs: resolve-staging
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-jammy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run security tests
        continue-on-error: true
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ needs.resolve-staging.outputs.staging_url }}
          BASE_URL: ${{ needs.resolve-staging.outputs.staging_url }}
          HOME: /root
          NEXT_PUBLIC_SKIP_LOADING_DELAY: 'true'
        run: |
          echo "────────────────────────────────────────"
          echo "  AGENT 2: SECURITY AUDIT"
          echo "  Target: $PLAYWRIGHT_TEST_BASE_URL"
          echo "────────────────────────────────────────"
          npx playwright test tests/e2e/security-audit.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-security
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-security
          path: test-results.json
          if-no-files-found: warn
          retention-days: 7

  test-chaos:
    name: "Agent 3: Chaos"
    needs: resolve-staging
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-jammy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run chaos tests
        continue-on-error: true
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ needs.resolve-staging.outputs.staging_url }}
          BASE_URL: ${{ needs.resolve-staging.outputs.staging_url }}
          HOME: /root
          NEXT_PUBLIC_SKIP_LOADING_DELAY: 'true'
        run: |
          echo "────────────────────────────────────────"
          echo "  AGENT 3: CHAOS AGENT"
          echo "  Target: $PLAYWRIGHT_TEST_BASE_URL"
          echo "────────────────────────────────────────"
          npx playwright test tests/e2e/chaos-agent.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-chaos
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-chaos
          path: test-results.json
          if-no-files-found: warn
          retention-days: 7

  test-accessibility:
    name: "Agent 4: Accessibility"
    needs: resolve-staging
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-jammy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run accessibility tests
        continue-on-error: true
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ needs.resolve-staging.outputs.staging_url }}
          BASE_URL: ${{ needs.resolve-staging.outputs.staging_url }}
          HOME: /root
          NEXT_PUBLIC_SKIP_LOADING_DELAY: 'true'
        run: |
          echo "────────────────────────────────────────"
          echo "  AGENT 4: ACCESSIBILITY"
          echo "  Target: $PLAYWRIGHT_TEST_BASE_URL"
          echo "────────────────────────────────────────"
          npx playwright test tests/e2e/accessibility-agent.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-accessibility
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-a11y
          path: test-results.json
          if-no-files-found: warn
          retention-days: 7

  test-performance:
    name: "Agent 5: Performance"
    needs: resolve-staging
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-jammy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run performance tests
        continue-on-error: true
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ needs.resolve-staging.outputs.staging_url }}
          BASE_URL: ${{ needs.resolve-staging.outputs.staging_url }}
          HOME: /root
          NEXT_PUBLIC_SKIP_LOADING_DELAY: 'true'
        run: |
          echo "────────────────────────────────────────"
          echo "  AGENT 5: PERFORMANCE"
          echo "  Target: $PLAYWRIGHT_TEST_BASE_URL"
          echo "────────────────────────────────────────"
          npx playwright test tests/e2e/performance-agent.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-performance
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-perf
          path: test-results.json
          if-no-files-found: warn
          retention-days: 7

  # ====================================================
  # JOB 4: QC REPORT
  # Replaces the old gate + handle-failure + success jobs.
  # Reads all JSON results, creates per-test issues, and
  # generates a summary dashboard. Pipeline stays green.
  # ====================================================
  qc-report:
    name: QC Report
    needs: [test-wizard, test-executive-review, test-security, test-chaos, test-accessibility, test-performance]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      gate_passed: ${{ steps.qc.outputs.gate_passed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Ensure QC labels exist (idempotent) ──
      - name: Create QC labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "archer"         --color "7B2D8B" --description "Archer CI/CD pipeline" --force 2>/dev/null || true
          gh label create "qc:blocker"     --color "D73A4A" --description "Critical test failure — blocks promotion" --force 2>/dev/null || true
          gh label create "qc:advisory"    --color "FBCA04" --description "Advisory test failure — does not block" --force 2>/dev/null || true
          gh label create "qc:report"      --color "0075CA" --description "QC summary report" --force 2>/dev/null || true
          gh label create "agent:wizard"   --color "C2C2C2" --description "Wizard + Enrichment agent" --force 2>/dev/null || true
          gh label create "agent:exec-review" --color "C2C2C2" --description "Executive Review agent" --force 2>/dev/null || true
          gh label create "agent:security" --color "C2C2C2" --description "Security agent" --force 2>/dev/null || true
          gh label create "agent:chaos"    --color "C2C2C2" --description "Chaos agent" --force 2>/dev/null || true
          gh label create "agent:a11y"     --color "C2C2C2" --description "Accessibility agent" --force 2>/dev/null || true
          gh label create "agent:perf"     --color "C2C2C2" --description "Performance agent" --force 2>/dev/null || true
          gh label create "qc:timeout"    --color "FFA500" --description "Timeout failure — likely infrastructure, not blocking" --force 2>/dev/null || true

      # ── Download all JSON artifacts ──
      - name: Download wizard results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: test-results-wizard
          path: qc-results/wizard/

      - name: Download exec-review results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: test-results-exec-review
          path: qc-results/exec-review/

      - name: Download security results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: test-results-security
          path: qc-results/security/

      - name: Download chaos results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: test-results-chaos
          path: qc-results/chaos/

      - name: Download a11y results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: test-results-a11y
          path: qc-results/a11y/

      - name: Download perf results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: test-results-perf
          path: qc-results/perf/

      # ── Rename files to expected names ──
      - name: Prepare result files
        run: |
          for agent in wizard exec-review security chaos a11y perf; do
            SRC="qc-results/${agent}/test-results.json"
            DEST="qc-results/test-results-${agent}.json"
            if [ -f "$SRC" ]; then
              mv "$SRC" "$DEST"
              echo "✓ $DEST"
            else
              echo "⚠ No results for ${agent}"
            fi
          done
          # Clean up empty dirs
          rm -rf qc-results/wizard qc-results/exec-review qc-results/security qc-results/chaos qc-results/a11y qc-results/perf 2>/dev/null || true

      # ── Run QC report script ──
      - name: Generate QC report
        id: qc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QC_RESULTS_DIR: qc-results
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/archer-qc-report.mjs

      # ── Create summary issue ──
      - name: Create summary issue
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f qc-summary.md ]; then
            echo "No summary generated. Skipping."
            exit 0
          fi

          GATE="${{ steps.qc.outputs.gate_passed }}"
          if [ "$GATE" = "true" ]; then
            TITLE="QC Report — Run #${{ github.run_number }} — ✅ Gate Passed"
          else
            TITLE="QC Report — Run #${{ github.run_number }} — ❌ Gate Blocked"
          fi

          gh issue create \
            --title "$TITLE" \
            --body-file qc-summary.md \
            --label "archer,qc:report" \
            --assignee "${{ github.repository_owner }}" 2>/dev/null || \
          gh issue create \
            --title "$TITLE" \
            --body-file qc-summary.md \
            --label "archer,qc:report" 2>/dev/null || true

  # ====================================================
  # JOB 5: PROMOTE TO PRODUCTION
  # Merges beta → main, deploys if secrets configured.
  # Only runs when QC gate passes.
  # ====================================================
  promote-to-prod:
    name: Promote to Production
    needs: [qc-report, resolve-staging]
    if: needs.qc-report.outputs.gate_passed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Create backup tag ──
      - name: Create backup tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="prod-$(date +'%Y-%m-%d-%H%M')-run${{ github.run_number }}"
          gh release create "$TAG" --generate-notes --title "Production $TAG" || echo "Tag skipped"

      # ── Merge beta → main ──
      - name: Promote beta to main
        run: |
          git config user.name 'Archer Pipeline'
          git config user.email 'archer@github-actions.bot'
          git fetch origin beta main
          git checkout main
          git merge origin/beta --no-edit -m "promote: beta → main — Archer run #${{ github.run_number }} [skip ci]" || {
            echo "Merge conflict. Skipping promotion — manual merge required."
            exit 0
          }
          git push origin main
          echo "Beta merged into main."

      # ── Deploy frontend to production Vercel (if secrets available) ──
      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_PROD: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID_PROD" ]; then
            echo "Vercel secrets not configured. Skipping production frontend deploy."
            echo "To enable: add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_PROD to repo secrets."
            exit 0
          fi

          echo "Triggering Vercel production deployment..."
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"amd1-1\",
              \"project\": \"$VERCEL_PROJECT_ID_PROD\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": \"${{ github.repository_id }}\",
                \"ref\": \"main\"
              }
            }" 2>&1)

          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty' 2>/dev/null)
          if [ -n "$ERROR" ]; then
            echo "Vercel API error: $ERROR"
          else
            URL=$(echo "$RESPONSE" | jq -r '.url // "pending"' 2>/dev/null)
            echo "Production deployment triggered: $URL"
          fi

      # ── Deploy backend to production Render (if hook available) ──
      - name: Deploy to Render production
        env:
          RENDER_DEPLOY_HOOK_PROD: ${{ secrets.RENDER_DEPLOY_HOOK_PROD }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_PROD" ]; then
            echo "Render production deploy hook not configured. Skipping backend deploy."
            echo "To enable: add RENDER_DEPLOY_HOOK_PROD to repo secrets."
            exit 0
          fi
          echo "Triggering Render production backend deployment..."
          curl -s "$RENDER_DEPLOY_HOOK_PROD" || echo "Render hook failed (non-critical)"

      # ── Create promotion success issue ──
      - name: Create promotion issue
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Production Promoted — Run #${{ github.run_number }} — $(date +'%b %d %H:%M') UTC" \
            --body "$(cat <<'EOF'
          ## Production Promotion Complete

          **Pipeline run:** #${{ github.run_number }}
          **Promoted:** `beta` → `main`

          ### Environment URLs

          | Environment | Frontend | Backend |
          |-------------|----------|---------|
          | **Beta** (testing) | https://amd1-1-beta.vercel.app | https://amd1-1-backend.onrender.com |
          | **Production** (stable) | https://amd1-1-alpha.vercel.app | https://amd1-1-backend-beta.onrender.com |

          ### Verification Checklist
          - [ ] Production frontend loads
          - [ ] `/api/rad/status` returns OK on production
          - [ ] Wizard submits successfully on production

          [View pipeline run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          )" \
            --label "archer" \
            --assignee "${{ github.repository_owner }}" 2>/dev/null || \
          gh issue create \
            --title "Production Promoted — Run #${{ github.run_number }}" \
            --body "beta merged to main. Check https://amd1-1-alpha.vercel.app" \
            --label "archer" 2>/dev/null || true
